function subscribeSSE(jobId, vendorName) {
  const feed = document.getElementById('steps-feed');
  const statusText = document.getElementById('progress-status-text');
  const es = new EventSource(`/api/analyze/${jobId}/progress`);

  es.addEventListener('status', e => {
    const d = JSON.parse(e.data);
    statusText.textContent = tr('runningCategory', { category: d.category });
  });

  es.addEventListener('step', e => {
    const step = JSON.parse(e.data);
    const div = document.createElement('div');
    div.className = `step-item step-${step.type}`;
    const tag = `<span class="step-tag">${step.type}</span>`;
    const content = step.content.length > 300 ? step.content.slice(0, 300) + '...' : step.content;
    div.innerHTML = tag + escHtml(content);
    feed.appendChild(div);
    feed.scrollTop = feed.scrollHeight;
  });

  es.addEventListener('done', e => {
    es.close();
    const d = JSON.parse(e.data);
    document.getElementById('progress-spinner').style.display = 'none';
    statusText.textContent = t('analysisComplete');
    document.getElementById('btn-analyze').disabled = false;

    const resultEl = document.getElementById('analysis-result');
    resultEl.innerHTML = `
      <div class="result-card">
        <div>
          <div class="score-big">${d.score ? d.score.toFixed(1) : '—'}</div>
          <div style="font-size:11px;color:var(--text2)">/ 10 score</div>
        </div>
        <div>
          <div style="font-weight:700;font-size:15px">${escHtml(vendorName)} ${t('analyzed')}</div>
          <div class="result-meta">${t('position')}: <strong>${d.position ? localizePosition(d.position) : '—'}</strong></div>
          <div class="result-meta">${t('time')}: ${d.timeMs ? (d.timeMs/1000).toFixed(1)+'s' : '—'}</div>
        </div>
        <div style="margin-left:auto;display:flex;gap:8px">
          <button class="btn btn-primary" onclick="viewVendorAnalysis(${d.vendorId})">${t('openAnalysis')}</button>
          <button class="btn btn-secondary" onclick="navigate('vendors')">${t('viewAllVendors')}</button>
        </div>
      </div>`;
    toast(tr('analyzedSuccess', { vendor: vendorName, score: d.score ? d.score.toFixed(1) : '?' }), 'success');

    // Refresh counts
    refreshCounts();
  });

  es.addEventListener('error', e => {
    es.close();
    let msg = t('analysisFailed');
    try { msg = JSON.parse(e.data).error || msg; } catch {}
    document.getElementById('progress-spinner').style.display = 'none';
    statusText.textContent = t('error');
    document.getElementById('btn-analyze').disabled = false;
    toast(msg, 'error');

    const feed = document.getElementById('steps-feed');
    const div = document.createElement('div');
    div.className = 'step-item step-action';
    div.innerHTML = `<span class="step-tag">error</span>${escHtml(msg)}`;
    feed.appendChild(div);
  });

  // Fallback for connection error
  es.onerror = () => {
    if (es.readyState === EventSource.CLOSED) return;
    es.close();
    statusText.textContent = t('connectionLost');
    document.getElementById('progress-spinner').style.display = 'none';
    document.getElementById('btn-analyze').disabled = false;
  };
}

function resetAnalysis() {
  document.getElementById('a-category').value = '';
  document.getElementById('a-vendor').value = '';

  document.getElementById('progress-panel').classList.remove('visible');

let modalState = 'normal'; // 'normal' | 'maximized' | 'minimized'

function toggleMaximize() {
  const modal   = document.getElementById('vendor-modal');
  const overlay = document.getElementById('vendor-overlay');
  const btn     = document.getElementById('btn-maximize');
  if (modalState === 'maximized') {
    modal.classList.remove('maximized');
    overlay.classList.remove('maximized');
    btn.title = 'Maximize';
    btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>`;
    modalState = 'normal';
  } else {
    modal.classList.remove('minimized');
    modal.classList.add('maximized');
    overlay.classList.add('maximized');
    btn.title = 'Restore';
    btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>`;
    modalState = 'maximized';
  }
}

function minimizeModal() {
  const modal = document.getElementById('vendor-modal');
  const btn   = document.getElementById('btn-minimize');
  if (modalState === 'minimized') {
    modal.classList.remove('minimized', 'maximized');
    document.getElementById('vendor-overlay').classList.remove('maximized');
    btn.title = 'Minimize';
    btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/></svg>`;
    modalState = 'normal';

    modal.classList.remove('maximized');
    document.getElementById('vendor-overlay').classList.remove('maximized');
    modal.classList.add('minimized');
    btn.title = 'Restore';
    btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>`;

function rationaleBox(rat, categoryName) {

function criterionEvidenceBox(evidence, categoryName) {

function renderMarkdownToHtml(markdown) {
  const lines = String(markdown || '').replace(/\r\n/g, '\n').split('\n');
  const out = [];

  let inCode = false;
  let inUl = false;
  let inOl = false;

  function closeLists() {
    if (inUl) { out.push('</ul>'); inUl = false; }
    if (inOl) { out.push('</ol>'); inOl = false; }
  }

  function formatInline(text) {
    let s = escHtml(text);
    s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
    s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/\*([^*]+)\*/g, '<em>$1</em>');
    s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
    return s;
  }

  function isTableHeader(index) {
    if (index + 1 >= lines.length) return false;
    const current = lines[index] || '';
    const next = lines[index + 1] || '';
    return current.includes('|') && /^\s*\|?\s*[:\-\s|]+\|?\s*$/.test(next);
  }

  function parseTableRow(line) {
    return line.trim().replace(/^\|/, '').replace(/\|$/, '').split('|').map(c => c.trim());
  }

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];

    if (/^```/.test(line.trim())) {
      closeLists();
      if (!inCode) {
        inCode = true;
        out.push('<pre><code>');
      } else {
        inCode = false;
        out.push('</code></pre>');
      }
      continue;
    }

    if (inCode) {
      out.push(`${escHtml(line)}\n`);
      continue;
    }

    if (isTableHeader(i)) {
      closeLists();
      const headers = parseTableRow(lines[i]);
      out.push('<table><thead><tr>');
      headers.forEach(h => out.push(`<th>${formatInline(h)}</th>`));
      out.push('</tr></thead><tbody>');

      i += 2;
      while (i < lines.length && lines[i].includes('|') && lines[i].trim() !== '') {
        const cols = parseTableRow(lines[i]);
        out.push('<tr>');
        cols.forEach(c => out.push(`<td>${formatInline(c)}</td>`));
        out.push('</tr>');
        i++;
      }
      out.push('</tbody></table>');
      i -= 1;
      continue;
    }

    const h = line.match(/^(#{1,6})\s+(.*)$/);
    if (h) {
      closeLists();
      const lvl = h[1].length;
      out.push(`<h${lvl}>${formatInline(h[2])}</h${lvl}>`);
      continue;
    }

    const quote = line.match(/^>\s?(.*)$/);
    if (quote) {
      closeLists();
      out.push(`<blockquote>${formatInline(quote[1])}</blockquote>`);
      continue;
    }

    const ul = line.match(/^[-*]\s+(.*)$/);
    if (ul) {
      if (inOl) { out.push('</ol>'); inOl = false; }
      if (!inUl) { out.push('<ul>'); inUl = true; }
      out.push(`<li>${formatInline(ul[1])}</li>`);
      continue;
    }

    const ol = line.match(/^\d+\.\s+(.*)$/);
    if (ol) {
      if (inUl) { out.push('</ul>'); inUl = false; }
      if (!inOl) { out.push('<ol>'); inOl = true; }
      out.push(`<li>${formatInline(ol[1])}</li>`);
      continue;
    }

    if (line.trim() === '') {
      closeLists();
      continue;
    }

    closeLists();
    out.push(`<p>${formatInline(line)}</p>`);
  }

  closeLists();
  if (inCode) out.push('</code></pre>');
  return out.join('');
}

// ── Link checker ──────────────────────────────────────────────────────────────
async function checkLinks(links) {
  const normalized = (links || []).map(normalizeHttpLink).filter(Boolean);

  // Reset all to checking state
  normalized.forEach((_, i) => {
    const dot = document.getElementById(`dot-${i}`);
    const st  = document.getElementById(`st-${i}`);
    if (dot) { dot.className = 'source-dot checking'; }
    if (st)  { st.textContent = '…'; st.className = 'source-status'; }
  });

  try {
    const res = await fetch('/api/check-urls', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ urls: normalized }),
    });
    const { results } = await res.json();
    results.forEach((r, i) => {
      const dot = document.getElementById(`dot-${i}`);
      const st  = document.getElementById(`st-${i}`);
      if (!dot) return;
      if (r.ok) {
        dot.className = 'source-dot ok';
        if (st) { st.textContent = r.status; st.className = 'source-status'; }
      } else {
        dot.className = 'source-dot broken';
        if (st) { st.textContent = r.status || 'ERR'; st.className = 'source-status broken'; }
      }
    });
  } catch {
    normalized.forEach((_, i) => {
      const dot = document.getElementById(`dot-${i}`);
      if (dot) dot.className = 'source-dot';
    });
  }
}

async function exportVendorMarkdown() {
  const v = currentVendor;
  if (!v) return;

  toast(t('validatingUrls'), 'info');

  const date  = new Date().toISOString().slice(0, 10);

  const criterionEvidence = v.criterionEvidence || {};
  const allCandidateLinks = [
    ...(v.resourceLinks || []),
    ...Object.values(criterionEvidence).flatMap(arr => Array.isArray(arr) ? arr : []),
    ...(v.website ? [v.website] : []),
  ]
    .map(normalizeHttpLink)
    .filter(Boolean);

  const uniqueCandidates = [...new Set(allCandidateLinks)];
  const validation = await validateUrlsForMarkdown(uniqueCandidates);
  const md = buildVendorMarkdownReport(v, validation);

  const blob = new Blob([md], { type: 'text/markdown' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${v.name.replace(/[^a-z0-9]/gi,'_')}_analysis_${date}.md`;
  a.click();
  URL.revokeObjectURL(a.href);
  toast(tr('exportedMarkdown', { vendor: v.name, count: validation.valid.length }), 'success');
}

async function validateUrlsForMarkdown(urls) {
  if (!urls || urls.length === 0) return { valid: [], invalid: [] };

  try {
    const valid = [];
    const invalid = [];

    for (let i = 0; i < urls.length; i += 30) {
      const batch = urls.slice(i, i + 30);
      const res = await fetch('/api/check-urls', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ urls: batch }),
      });

      if (!res.ok) {
        batch.forEach(url => invalid.push({ url, status: 0, reason: 'Validation request failed' }));
        continue;
      }

      const payload = await res.json();
      const results = Array.isArray(payload?.results) ? payload.results : [];
      results.forEach(r => {
        if (r.ok && r.status !== 404) {
          valid.push({ url: r.url, status: r.status });
        } else {
          invalid.push({ url: r.url, status: r.status || 0, reason: r.error || (r.status === 404 ? '404 Not Found' : 'Not reachable') });
        }
      });
    }

    return { valid, invalid };
  } catch {
    return { valid: [], invalid: urls.map(url => ({ url, status: 0, reason: 'Validation error' })) };
  }
}

          <span class="formula-eq">=</span>
          <span class="formula-text">Σ ( criterion score × weight )</span>
          <span class="formula-range">→ ${t('range0to10')}</span>
        </div>
        <div class="breakdown-weights">
          ${items.filter(([,, w]) => w > 0).map(([label,, w]) => `
            <div class="bw-item">
              <div class="bw-bar" style="width:${w*100*2}px"></div>
              <span class="bw-label">${label}</span>
              <span class="bw-pct">${(w*100).toFixed(0)}%</span>
            </div>`).join('')}
        </div>
        <div class="breakdown-note">
          <span class="breakdown-note-score">${weighted}<span style="font-size:11px;opacity:.6">/10</span></span>
          <span>${t('weightedScoreNote')}</span>
        </div>
      </div>
    </div>`;
}

function closeModal(event) {
  if (event && event.target !== document.getElementById('vendor-overlay')) return;
  document.getElementById('vendor-overlay').classList.remove('open');
  if (state.radarChart) { state.radarChart.destroy(); state.radarChart = null; }
}

// ══════════════════════════════════════════════════════════════════════════
//  Radar chart
// ══════════════════════════════════════════════════════════════════════════
function buildRadarChart(canvasId, vendor) {
  const canvas = document.getElementById(canvasId);
  if (!canvas || !vendor.criteria) return;
  const c = vendor.criteria;
  const criteria = getCriteriaForCategory(vendor.categoryName);
  const data = criteria.map(item => c[item.key] ?? 0);

  if (state.radarChart) state.radarChart.destroy();
  state.radarChart = new Chart(canvas, {
    type: 'radar',
    data: {
      labels: criteria.map(item => item.short),
      datasets: [{
        label: vendor.name,
        data,
        backgroundColor: 'rgba(0,212,170,.15)',
        borderColor: '#00d4aa',
        pointBackgroundColor: '#00d4aa',
        borderWidth: 2,
        pointRadius: 4,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        r: {
          min: 0, max: 10,
          grid: { color: '#30363d' },
          angleLines: { color: '#30363d' },
          ticks: { color: '#8b949e', backdropColor: 'transparent', stepSize: 2 },
          pointLabels: { color: '#8b949e', font: { size: 11 } },
        }
      }
    }
  });
}

function buildCategoryCriteriaComparisonChart(canvasId, vendors) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;

  if (state.categoryCriteriaChart) {
    state.categoryCriteriaChart.destroy();
    state.categoryCriteriaChart = null;
  }

  const sorted = [...vendors].sort((a, b) => (b.rankingScore || 0) - (a.rankingScore || 0));
  const criteria = getCriteriaForCategory(sorted[0]?.categoryName);
  const labels = sorted.map(v => v.name);
  const palette = ['#00d4aa', '#58a6ff', '#bc8cff', '#e3b341', '#f78166', '#a5d6ff', '#7ee787', '#ff9bce', '#79c0ff', '#ffa657'];

  state.categoryCriteriaChart = new Chart(canvas, {
    type: 'bar',
    data: {
      labels,
      datasets: criteria.map((item, idx) => ({
        label: item.short,
        data: sorted.map(v => v.criteria ? (v.criteria[item.key] ?? 0) : 0),
        backgroundColor: palette[idx % palette.length],
        borderRadius: 3,
      })),
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { position: 'bottom' },
        tooltip: {
          callbacks: {
            label: (ctx) => {
              const full = criteria.find(c => c.short === ctx.dataset.label);
              return `${full ? criterionLabel(full) : ctx.dataset.label}: ${ctx.parsed.x.toFixed(1)}/10`;
            },
          },
        },
      },
      scales: {
        x: { ticks: { color: '#8b949e' }, grid: { color: '#30363d' } },
        y: { min: 0, max: 10, ticks: { stepSize: 1, color: '#8b949e' }, grid: { color: '#30363d' } },
      },
    },
  });
}

// ══════════════════════════════════════════════════════════════════════════
//  Refresh sidebar counts
// ══════════════════════════════════════════════════════════════════════════
async function refreshCounts() {
  try {
    const status = await api('/api/status');
    document.getElementById('badge-total').textContent = status.vendorCount;
    state.totalVendors = status.vendorCount;

    for (const def of state.categoryDefs) {
      try {
        const vs = await api(`/api/categories/${encodeURIComponent(def.name)}/vendors`);
        const badge = document.getElementById(`badge-cat-${def.name}`);
        if (badge) badge.textContent = vs.length;
      } catch {}
    }
  } catch {}
}

// ══════════════════════════════════════════════════════════════════════════
//  Escape helpers
// ══════════════════════════════════════════════════════════════════════════
function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function esc(s) {
  return String(s ?? '').replace(/'/g, "\\'").replace(/\\/g, '\\\\');
}
function escJson(obj) {
  return JSON.stringify(obj)
    .replace(/</g,'\\u003c')
    .replace(/>/g,'\\u003e')
    .replace(/&/g,'\\u0026')
    .replace(/'/g,'\\u0027');
}

function normalizeHttpLink(raw) {
  if (!raw || typeof raw !== 'string') return null;
  let value = raw.trim();
  if (!value) return null;

  const md = value.match(/^\[[^\]]+\]\(([^)]+)\)$/);
  if (md && md[1]) value = md[1].trim();

  value = value.replace(/^['"`\s]+|['"`\s,.;:!?]+$/g, '');
  if (!value) return null;

  if (value.startsWith('//')) value = `https:${value}`;
  if (!/^https?:\/\//i.test(value)) value = `https://${value}`;

  try {
    const u = new URL(value);
    if (u.protocol !== 'http:' && u.protocol !== 'https:') return null;
    if (!u.hostname) return null;
    return u.toString();
  } catch {
    return null;
  }
}

// ══════════════════════════════════════════════════════════════════════════
//  Boot
// ══════════════════════════════════════════════════════════════════════════
async function boot() {
  try {
    const storedLang = localStorage.getItem('vendors_ai_language');
    if (storedLang === 'en' || storedLang === 'es') state.language = storedLang;
    applyStaticTranslations();

    const [defs, cats] = await Promise.all([
      api('/api/category-defs'),
      api('/api/categories'),
    ]);
    state.categoryDefs = defs;
    state.categories = cats;

    buildSidebar(cats, defs);
    await render();
    await refreshCounts();
    checkLmStatus();
  } catch (e) {
    document.getElementById('main-content').innerHTML = `
      <div class="empty-state" style="margin-top:80px">
        <div class="icon">⚠️</div>
        <h3>${t('cannotConnectServer')}</h3>
        <p>${t('ensureServerRunning')}</p>
        <p style="margin-top:8px;font-size:12px;color:var(--text2)">${escHtml(e.message)}</p>
      </div>`;
  }
}

document.addEventListener('DOMContentLoaded', boot);

// Close modal on Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.getElementById('vendor-overlay').classList.remove('open');
    if (state.radarChart) { state.radarChart.destroy(); state.radarChart = null; }
  }
});
</script>
