<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vendors AI Master</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ── Reset & Variables ──────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0d1117;
  --bg2:       #161b22;
  --bg3:       #21262d;
  --border:    #30363d;
  --accent:    #00d4aa;
  --accent2:   #58a6ff;
  --text:      #e6edf3;
  --text2:     #8b949e;
  --danger:    #f85149;
  --warn:      #e3b341;
  --success:   #3fb950;
  --leader:    #ffd700;
  --challenger:#58a6ff;
  --visionary: #bc8cff;
  --niche:     #8b949e;
  --sidebar-w: 220px;
  --header-h:  56px;
  --radius:    8px;
  --shadow:    0 4px 24px rgba(0,0,0,.4);
}

body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 15px; line-height: 1.6; overflow-x: hidden; }

/* ── MITRE Coverage Chatbot ──────────────────────────────────────────────── */
.mitre-chat-wrap { display:flex; flex-direction:column; gap:20px; max-width:960px; }
.mitre-input-bar { display:flex; gap:10px; align-items:flex-end; }
.mitre-input-bar input { flex:1; padding:10px 14px; background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius); color:var(--text); font-size:14px; outline:none; transition:border-color .2s; }
.mitre-input-bar input:focus { border-color:var(--accent); }
.mitre-clarify { padding:10px 14px; background:rgba(227,179,65,.08); border:1px solid var(--warn); border-radius:var(--radius); color:var(--warn); font-size:13px; }
.chat-log { display:flex; flex-direction:column; gap:16px; }
.chat-bubble { padding:14px 18px; border-radius:var(--radius); font-size:13px; line-height:1.6; }
.chat-bubble.user { background:rgba(0,212,170,.08); border:1px solid rgba(0,212,170,.2); align-self:flex-end; max-width:70%; color:var(--text); }
.chat-bubble.agent { background:var(--bg3); border:1px solid var(--border); align-self:flex-start; width:100%; }
.chat-bubble.thinking { color:var(--text2); font-style:italic; }
.chat-bubble.insufficient { background:rgba(248,81,73,.08); border:1px solid rgba(248,81,73,.3); color:var(--danger); }
.coverage-report { display:flex; flex-direction:column; gap:12px; }
.coverage-header { display:flex; align-items:center; gap:14px; flex-wrap:wrap; margin-bottom:4px; }
.coverage-score { font-size:22px; font-weight:700; color:var(--accent); }
.coverage-score span { font-size:13px; font-weight:400; color:var(--text2); }
.coverage-summary { color:var(--text2); font-size:13px; margin-bottom:4px; }
.ttp-table { width:100%; border-collapse:collapse; font-size:13px; }
.ttp-table th { text-align:left; padding:6px 10px; color:var(--text2); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:.6px; border-bottom:1px solid var(--border); }
.ttp-table td { padding:7px 10px; border-bottom:1px solid rgba(48,54,61,.5); vertical-align:top; }
.ttp-table tr:last-child td { border-bottom:none; }
.ttp-table tr:hover td { background:rgba(255,255,255,.02); }
.cvg-badge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600; letter-spacing:.4px; text-transform:uppercase; }
.cvg-full    { background:rgba(63,185,80,.15);  color:#3fb950; border:1px solid rgba(63,185,80,.3); }
.cvg-partial { background:rgba(227,179,65,.15); color:#e3b341; border:1px solid rgba(227,179,65,.3); }
.cvg-none    { background:rgba(248,81,73,.15);  color:#f85149; border:1px solid rgba(248,81,73,.3); }
.cvg-unknown { background:rgba(139,148,158,.1); color:#8b949e; border:1px solid rgba(139,148,158,.2); }
.gap-list { display:flex; flex-direction:column; gap:4px; margin-top:4px; }
.gap-item { font-size:12px; color:var(--danger); padding:3px 0; }
.step-feed-mitre { display:flex; flex-direction:column; gap:6px; }
.step-item-mitre { display:flex; gap:8px; align-items:flex-start; font-size:12px; color:var(--text2); }
.step-type-mitre { font-weight:600; font-size:10px; letter-spacing:.5px; padding:2px 6px; border-radius:3px; background:var(--bg2); color:var(--accent2); flex-shrink:0; margin-top:1px; }

/* ── MITRE Conversation History ──────────────────────────────────────────── */
.conv-history { display:flex; flex-direction:column; gap:4px; }
.conv-item { display:flex; align-items:center; gap:6px; padding:8px 10px; border-radius:var(--radius); border:1px solid transparent; cursor:pointer; transition:background .15s,border-color .15s; }
.conv-item:hover { background:var(--bg3); border-color:var(--border); }
.conv-item.active { background:rgba(0,212,170,.08); border-color:rgba(0,212,170,.25); }
.conv-item-title { flex:1; font-size:12px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; min-width:0; }
.conv-item-date { font-size:10px; color:var(--text2); flex-shrink:0; }
.conv-item-del { flex-shrink:0; padding:2px 5px; background:none; border:none; color:var(--text2); cursor:pointer; border-radius:3px; font-size:11px; opacity:0; transition:opacity .15s,color .15s; }
.conv-item:hover .conv-item-del { opacity:1; }
.conv-item-del:hover { color:var(--danger); }
.conv-saved-tag { display:inline-flex; align-items:center; gap:4px; font-size:10px; color:var(--success); padding:1px 6px; border:1px solid rgba(63,185,80,.3); border-radius:10px; }

/* ── MITRE Coverage DB ───────────────────────────────────────────────────── */
.cvgdb-layout { display:grid; grid-template-columns:360px 1fr; gap:16px; align-items:start; }
.cvgdb-table { width:100%; border-collapse:collapse; font-size:13px; }
.cvgdb-table th { text-align:left; padding:7px 10px; color:var(--text2); font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.5px; border-bottom:1px solid var(--border); }
.cvgdb-table td { padding:8px 10px; border-bottom:1px solid rgba(48,54,61,.5); vertical-align:middle; }
.cvgdb-table tr:last-child td { border-bottom:none; }
.cvgdb-table tr.active td { background:rgba(0,212,170,.06); }
.cvgdb-table tr:hover td { background:rgba(255,255,255,.03); cursor:pointer; }
.cvgdb-score { font-size:16px; font-weight:700; }
.cvgdb-runs { display:inline-flex; align-items:center; gap:3px; font-size:11px; color:var(--text2); }
.cvgdb-sparkline { display:flex; align-items:flex-end; gap:2px; height:20px; }
.cvgdb-spark-bar { width:5px; background:var(--accent); border-radius:1px; min-height:2px; opacity:.8; }
.cvgdb-empty { color:var(--text2); font-size:13px; padding:24px; text-align:center; }
.cvgdb-detail-header { display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:12px; }
.cvgdb-history { display:flex; flex-direction:column; gap:8px; }
.cvgdb-run-row { display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:var(--radius); border:1px solid var(--border); background:var(--bg2); font-size:12px; }
.cvgdb-run-row:hover { border-color:var(--accent2); cursor:pointer; }
.cvgdb-run-row.active { border-color:var(--accent); background:rgba(0,212,170,.06); }
.cvgdb-run-num { font-size:10px; font-weight:700; color:var(--text2); width:22px; flex-shrink:0; }
.cvgdb-run-date { color:var(--text2); flex:1; }
.cvgdb-run-del { flex-shrink:0; background:none; border:none; color:var(--text2); cursor:pointer; padding:2px 6px; border-radius:3px; font-size:11px; }
.cvgdb-run-del:hover { color:var(--danger); }
.cvgdb-tab-bar { display:flex; gap:2px; margin-bottom:12px; }
.cvgdb-tab { padding:5px 14px; border-radius:6px; border:1px solid var(--border); font-size:12px; cursor:pointer; color:var(--text2); background:none; transition:all .15s; }
.cvgdb-tab.active { background:var(--accent); border-color:var(--accent); color:#000; font-weight:600; }
.cvgdb-tab:not(.active):hover { border-color:var(--accent2); color:var(--text); }

/* ── Palo Alto RAG page ─────────────────────────────────────────────────── */
.prag-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.prag-grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
.prag-status-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; display:inline-block; margin-right:6px; }
.prag-status-dot.ok { background:var(--success); box-shadow:0 0 6px var(--success); }
.prag-status-dot.down { background:var(--danger); }
.prag-status-dot.checking { background:var(--warn); animation:pulse 1s infinite; }
.prag-kv { font-size:12px; color:var(--text2); display:flex; justify-content:space-between; margin-bottom:4px; }
.prag-kv strong { color:var(--text); }
.prag-bar-row { display:flex; align-items:center; gap:8px; font-size:12px; margin-bottom:6px; }
.prag-bar { flex:1; height:6px; background:var(--bg3); border-radius:3px; overflow:hidden; }
.prag-bar-fill { height:100%; background:var(--accent); border-radius:3px; transition:width .4s; }
.prag-url-list { display:flex; flex-direction:column; gap:6px; margin:10px 0; }
.prag-url-item { display:flex; align-items:center; gap:6px; background:var(--bg3); padding:5px 8px; border-radius:5px; font-size:12px; }
.prag-url-item span { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--text2); }
.prag-url-del { background:none; border:none; color:var(--text2); cursor:pointer; padding:1px 4px; font-size:12px; flex-shrink:0; }
.prag-url-del:hover { color:var(--danger); }
.prag-result { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:14px 18px; font-size:13px; line-height:1.6; word-break:break-word; max-height:720px; overflow-y:auto; }
.markdown-rendered h1 { font-size:18px; font-weight:700; margin:12px 0 8px; color:var(--text); }
.markdown-rendered h2 { font-size:15px; font-weight:700; margin:10px 0 6px; color:var(--accent); border-bottom:2px solid rgba(0,212,170,.2); padding-bottom:4px; }
.markdown-rendered h3 { font-size:14px; font-weight:600; margin:8px 0 4px; color:var(--accent2); }
.markdown-rendered strong { font-weight:700; color:var(--text); }
.markdown-rendered em { font-style:italic; color:var(--text2); }
.markdown-rendered ul, .markdown-rendered ol { margin:6px 0; padding-left:20px; }
.markdown-rendered li { margin:3px 0; }
.markdown-rendered a { color:var(--accent2); text-decoration:none; font-weight:500; }
.markdown-rendered a:hover { text-decoration:underline; }
.markdown-rendered code { background:rgba(0,212,170,.1); padding:2px 6px; border-radius:3px; color:var(--accent2); font-family:monospace; font-size:12px; }
.markdown-rendered pre { background:var(--bg3); border:1px solid var(--border); border-radius:4px; padding:8px 10px; overflow-x:auto; margin:6px 0; }
.markdown-rendered pre code { background:none; padding:0; color:var(--text2); }
.markdown-rendered blockquote { border-left:3px solid var(--accent); padding-left:10px; margin:6px 0; color:var(--text2); font-style:italic; }
.markdown-rendered table { border-collapse:collapse; width:100%; margin:8px 0; font-size:12px; }
.markdown-rendered table th { background:rgba(0,212,170,.1); padding:6px 8px; text-align:left; font-weight:600; border:1px solid var(--border); }
.markdown-rendered table td { padding:6px 8px; border:1px solid var(--border); }
.markdown-rendered table tr:hover { background:rgba(0,212,170,.05); }
.markdown-rendered p { margin:6px 0; }
.prag-confidence { display:inline-flex; align-items:center; gap:6px; font-size:12px; padding:3px 10px; border-radius:10px; border:1px solid; }
.prag-confidence.high { color:var(--success); border-color:rgba(63,185,80,.3); }
.prag-confidence.mid  { color:var(--warn);    border-color:rgba(210,153,34,.3); }
.prag-confidence.low  { color:var(--danger);  border-color:rgba(248,81,73,.3); }
.prag-source-badge { display:inline-flex; align-items:center; gap:3px; font-size:10px; padding:1px 7px; border-radius:8px; border:1px solid var(--border); color:var(--text2); margin:2px; }

/* ── Scrollbars ─────────────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── Header ─────────────────────────────────────────────────────────────── */
header {
  position: fixed; top: 0; left: 0; right: 0; height: var(--header-h);
  background: var(--bg2); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 20px; z-index: 100;
  gap: 12px;
}
.logo { display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: 700; color: var(--accent); letter-spacing: -.3px; }
.logo svg { flex-shrink: 0; }
.header-spacer { flex: 1; }
.lm-badge {
  display: flex; align-items: center; gap: 6px; font-size: 12px;
  padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border);
  color: var(--text2); cursor: pointer; transition: border-color .2s;
}
.lm-badge:hover { border-color: var(--accent); }
.lm-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text2); flex-shrink: 0; transition: background .3s; }
.lm-dot.online { background: var(--success); box-shadow: 0 0 6px var(--success); }
.lm-dot.offline { background: var(--danger); }

/* ── Layout ─────────────────────────────────────────────────────────────── */
.layout { display: flex; padding-top: var(--header-h); min-height: 100vh; }

/* ── Sidebar ────────────────────────────────────────────────────────────── */
aside {
  position: fixed; top: var(--header-h); left: 0; bottom: 0;
  width: var(--sidebar-w); background: var(--bg2);
  border-right: 1px solid var(--border); overflow-y: auto;
  padding: 16px 0;
}
.nav-section { padding: 0 12px; margin-bottom: 8px; }
.nav-label { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .8px; padding: 0 8px; margin-bottom: 4px; }
.nav-item {
  display: flex; align-items: center; gap: 8px; padding: 7px 8px;
  border-radius: var(--radius); cursor: pointer; color: var(--text2);
  font-size: 13px; transition: background .15s, color .15s; position: relative;
}
.nav-item:hover { background: var(--bg3); color: var(--text); }
.nav-item.active { background: rgba(0,212,170,.12); color: var(--accent); }
.nav-item .badge {
  margin-left: auto; font-size: 11px; background: var(--bg3);
  color: var(--text2); padding: 1px 6px; border-radius: 10px; min-width: 20px; text-align: center;
}
.nav-item.active .badge { background: rgba(0,212,170,.2); color: var(--accent); }
.nav-divider { border: none; border-top: 1px solid var(--border); margin: 8px 12px; }

/* ── Main Content ───────────────────────────────────────────────────────── */
main { margin-left: var(--sidebar-w); flex: 1; padding: 30px 34px; max-width: 1500px; }

/* ── Page Header ────────────────────────────────────────────────────────── */
.page-header { margin-bottom: 24px; }
.page-header h1 { font-size: 25px; font-weight: 700; color: var(--text); }
.page-header p { color: var(--text2); margin-top: 6px; font-size: 15px; }

/* ── Stats Row ──────────────────────────────────────────────────────────── */
.stats-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
.stat-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 18px 20px;
}
.stat-card .label { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; }
.stat-card .value { font-size: 28px; font-weight: 700; color: var(--accent); margin-top: 4px; }
.stat-card .sub { font-size: 12px; color: var(--text2); margin-top: 2px; }

/* ── Section ────────────────────────────────────────────────────────────── */
.section { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 24px; }
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px; border-bottom: 1px solid var(--border);
}
.section-title { font-size: 17px; font-weight: 600; }
.section-body { padding: 24px; }

/* ── Filters Bar ────────────────────────────────────────────────────────── */
.filters { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; align-items: center; }
.filter-group { display: flex; align-items: center; gap: 6px; }
.filter-group label { font-size: 12px; color: var(--text2); }
select, input[type=number], input[type=text] {
  background: var(--bg3); border: 1px solid var(--border); color: var(--text);
  border-radius: var(--radius); padding: 6px 10px; font-size: 13px;
  outline: none; transition: border-color .2s;
}
select:focus, input:focus { border-color: var(--accent2); }
select option { background: var(--bg3); }

/* ── Table ──────────────────────────────────────────────────────────────── */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
thead th {
  text-align: left; padding: 12px 16px; font-size: 12px; font-weight: 600;
  color: var(--text2); text-transform: uppercase; letter-spacing: .6px;
  border-bottom: 1px solid var(--border); white-space: nowrap;
}
tbody tr { border-bottom: 1px solid var(--border); cursor: pointer; transition: background .1s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--bg3); }
td { padding: 12px 16px; vertical-align: middle; }
td.name-cell { font-weight: 600; color: var(--text); }
td.name-cell small { display: block; font-weight: 400; color: var(--text2); font-size: 12px; }

/* ── Score Bar ──────────────────────────────────────────────────────────── */
.score-bar-wrap { display: flex; align-items: center; gap: 8px; min-width: 120px; }
.score-bar-track { flex: 1; height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
.score-bar-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }
.score-val { font-size: 13px; font-weight: 600; color: var(--text2); min-width: 34px; text-align: right; }

/* ── Badges ─────────────────────────────────────────────────────────────── */
.badge-pos {
  display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 12px;
  font-size: 11px; font-weight: 600; text-transform: capitalize;
}
.pos-leader     { background: rgba(255,215,0,.15);    color: var(--leader); }
.pos-challenger { background: rgba(88,166,255,.15);   color: var(--challenger); }
.pos-visionary  { background: rgba(188,140,255,.15);  color: var(--visionary); }
.pos-niche      { background: rgba(139,148,158,.15);  color: var(--niche); }
.pos-unknown    { background: rgba(139,148,158,.15);  color: var(--niche); }

.badge-mode {
  display: inline-flex; padding: 2px 8px; border-radius: 12px;
  font-size: 11px; border: 1px solid var(--border); color: var(--text2);
  text-transform: capitalize;
}

/* ── Empty State ────────────────────────────────────────────────────────── */
.empty-state { text-align: center; padding: 60px 20px; color: var(--text2); }
.empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: .4; }
.empty-state h3 { font-size: 16px; color: var(--text); margin-bottom: 8px; }
.empty-state p { font-size: 13px; }
.empty-state a { color: var(--accent2); cursor: pointer; text-decoration: underline; }

/* ── Vendor Modal ───────────────────────────────────────────────────────── */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 200;
  display: flex; align-items: center; justify-content: center;
  padding: 20px; opacity: 0; pointer-events: none; transition: opacity .2s;
}
.overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
  width: 100%; max-width: 1180px; max-height: 92vh; overflow-y: auto;
  box-shadow: var(--shadow); transform: translateY(20px);
  transition: transform .25s, max-width .2s, max-height .2s, border-radius .2s;
}
.overlay.open .modal { transform: translateY(0); }

/* Maximized state */
.modal.maximized {
  max-width: 100vw; max-height: 100vh; width: 100vw; height: 100vh;
  border-radius: 0; margin: 0;
}
.overlay.maximized { padding: 0; align-items: flex-start; }

/* Minimized state — only header visible */
.modal.minimized { max-height: 58px; overflow: hidden; border-radius: 10px; }

.modal-header {
  position: sticky; top: 0; background: var(--bg2); z-index: 1;
  padding: 14px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.modal-header h2 { font-size: 21px; font-weight: 700; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.modal-controls { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.modal-btn {
  background: none; border: none; color: var(--text2); cursor: pointer;
  width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center;
  justify-content: center; transition: color .15s, background .15s;
}
.modal-btn:hover { color: var(--text); background: var(--bg3); }
.modal-body { padding: 28px; }
.modal-grid { display: grid; grid-template-columns: minmax(420px, 1.3fr) minmax(380px, 1fr); gap: 30px; align-items: start; }
.vendor-analysis-left,
.vendor-analysis-right { display: flex; flex-direction: column; gap: 18px; }
.vendor-analysis-right {
  position: sticky;
  top: 78px;
  max-height: calc(92vh - 132px);
  overflow-y: auto;
  padding-right: 4px;
}
.vendor-meta-grid { display: grid; grid-template-columns: repeat(2, minmax(190px, 1fr)); gap: 14px; }
.modal-grid .detail-section {
  margin-bottom: 0;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
}
@media (max-width: 980px) {
  .modal-grid { grid-template-columns: 1fr; gap: 22px; }
  .modal-body { padding: 22px; }
  .vendor-analysis-right {
    position: static;
    max-height: none;
    overflow: visible;
    padding-right: 0;
  }
  .vendor-meta-grid { grid-template-columns: 1fr; }
}

/* ── Rationale / Analysis Summary ───────────────────────────────────────── */
.rationale-box {
  background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
  margin-bottom: 20px; overflow: hidden;
}
.rationale-box-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px; border-bottom: 1px solid var(--border);
  font-size: 11px; font-weight: 600; color: var(--text2);
  text-transform: uppercase; letter-spacing: .6px;
}
.rationale-overall {
  padding: 14px 16px; font-size: 14px; color: var(--text); line-height: 1.72;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(135deg, rgba(0,212,170,.04), transparent);
}
.rationale-grid {
  display: flex; flex-direction: column;
}
.rationale-row {
  display: grid; grid-template-columns: 220px 1fr; gap: 12px;
  padding: 10px 16px; border-bottom: 1px solid var(--border); font-size: 13px;
  transition: background .1s;
}
.rationale-row:last-child { border-bottom: none; }
.rationale-row:hover { background: var(--bg3); }
.rationale-crit { color: var(--text2); font-weight: 600; padding-top: 1px; }
.rationale-text { color: var(--text); line-height: 1.62; }

/* ── Sources / Links ────────────────────────────────────────────────────── */
.sources-box {
  background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
  margin-bottom: 20px; overflow: hidden;
}
.sources-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px; border-bottom: 1px solid var(--border);
  font-size: 11px; font-weight: 600; color: var(--text2);
  text-transform: uppercase; letter-spacing: .6px;
}
.sources-list { display: flex; flex-direction: column; }
.source-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: 13px;
}
.source-item:last-child { border-bottom: none; }
.source-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; background: var(--text2); }
.source-dot.ok      { background: var(--success); }
.source-dot.broken  { background: var(--danger); }
.source-dot.checking { background: var(--warn); animation: pulse .8s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.source-link { color: var(--accent2); text-decoration: none; flex: 1; white-space: normal; overflow-wrap: anywhere; line-height: 1.45; }
.source-link:hover { text-decoration: underline; }
.source-status { font-size: 11px; color: var(--text2); flex-shrink: 0; }
.source-status.broken { color: var(--danger); }
.btn-check-links {
  font-size: 11px; padding: 3px 8px; border-radius: 4px; cursor: pointer;
  background: var(--bg3); border: 1px solid var(--border); color: var(--text2);
  transition: border-color .15s, color .15s;
}
.btn-check-links:hover { border-color: var(--accent); color: var(--accent); }

.detail-section { margin-bottom: 20px; }
.detail-label { font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 8px; }
.detail-value { color: var(--text); font-size: 15px; line-height: 1.64; }
.tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
.tag { background: var(--bg3); border: 1px solid var(--border); padding: 4px 9px; border-radius: 4px; font-size: 13px; color: var(--text2); }
.pro-con-list { display: flex; flex-direction: column; gap: 6px; }
.pro-item { display: flex; gap: 8px; font-size: 14px; line-height: 1.55; }
.pro-item::before { content: '✓'; color: var(--success); flex-shrink: 0; font-weight: 700; }
.con-item { display: flex; gap: 8px; font-size: 14px; line-height: 1.55; }
.con-item::before { content: '✗'; color: var(--danger); flex-shrink: 0; font-weight: 700; }

.radar-wrap { position: relative; height: 280px; }

/* ── Score Breakdown Legend ─────────────────────────────────────────────── */
.breakdown-legend {
  margin-top: 16px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.breakdown-legend-header {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; font-weight: 600; color: var(--text2);
  text-transform: uppercase; letter-spacing: .6px;
  padding: 10px 14px; border-bottom: 1px solid var(--border);
}
.breakdown-legend-body { padding: 12px 14px; }
.breakdown-formula {
  display: flex; align-items: center; flex-wrap: wrap; gap: 6px;
  font-size: 13px; margin-bottom: 14px;
  padding: 8px 10px; background: var(--bg3); border-radius: 4px;
}
.formula-text { color: var(--text); font-weight: 600; }
.formula-eq   { color: var(--text2); }
.formula-range {
  margin-left: auto; font-size: 11px; color: var(--accent);
  font-weight: 700; white-space: nowrap;
}
.breakdown-weights { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
.bw-item { display: flex; align-items: center; gap: 8px; }
.bw-bar {
  height: 6px; border-radius: 3px; flex-shrink: 0;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  min-width: 4px;
}
.bw-label { font-size: 13px; color: var(--text2); flex: 1; }
.bw-pct   { font-size: 11px; font-weight: 700; color: var(--accent2); min-width: 28px; text-align: right; }
.breakdown-note {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; background: rgba(0,212,170,.07);
  border: 1px solid rgba(0,212,170,.2); border-radius: 4px;
  font-size: 12px; color: var(--text2); margin-bottom: 8px;
}
.breakdown-note-score {
  font-size: 22px; font-weight: 800; color: var(--accent); line-height: 1; white-space: nowrap;
}
.breakdown-note-sub {
  font-size: 11px; color: var(--text2); line-height: 1.5;
}
.breakdown-note-sub strong { color: var(--text); }

/* ── Radar Legend ───────────────────────────────────────────────────────── */
.radar-legend {
  margin-top: 14px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
}
.radar-legend-title {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; font-weight: 600; color: var(--text2);
  text-transform: uppercase; letter-spacing: .6px;
  margin-bottom: 10px;
}
.radar-legend-grid {
  display: flex; flex-direction: column; gap: 6px;
}
.radar-legend-item {
  padding: 5px 8px;
  border-radius: 4px;
  transition: background .15s;
}
.radar-legend-item:hover { background: var(--bg3); }
.radar-legend-row {
  display: flex; align-items: center; gap: 6px; margin-bottom: 2px;
}
.radar-abbr {
  font-size: 11px; font-weight: 700; color: var(--accent);
  min-width: 72px; flex-shrink: 0;
}
.radar-full {
  font-size: 13px; font-weight: 600; color: var(--text); flex: 1;
}
.radar-weight {
  font-size: 11px; font-weight: 700; color: var(--accent2);
  background: rgba(88,166,255,.1); border-radius: 10px;
  padding: 1px 7px; flex-shrink: 0;
}
.radar-weight.weight-zero {
  color: var(--text2); background: var(--bg3);
}
.radar-desc {
  font-size: 12px; color: var(--text2); line-height: 1.55; padding-left: 78px;
}

/* ── Markdown & URL preview ───────────────────────────────────────────── */
.markdown-preview-box,
.url-preview-box {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
}
.markdown-preview-box {
  background: linear-gradient(180deg, rgba(88,166,255,.07), rgba(0,0,0,0));
}
.vendor-extra-panels {
  margin-top: 22px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
}
.vendor-extra-panels .markdown-preview-box { grid-column: 1 / -1; }
.markdown-preview-head,
.url-preview-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 10px;
  font-size: 12px;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: .6px;
  font-weight: 600;
}
.markdown-preview-stats {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}
.md-chip {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 3px 10px;
  font-size: 11px;
  color: var(--text2);
}
.markdown-preview {
  width: 100%;
  min-height: 260px;
  max-height: 420px;
  overflow: auto;
  border: 1px solid var(--border);
  background: #0b1220;
  color: var(--text);
  border-radius: 6px;
  padding: 14px;
  font: 13px/1.6 Consolas, 'SF Mono', monospace;
  white-space: pre-wrap;
}
.markdown-rendered {
  width: 100%;
  min-height: 260px;
  max-height: 420px;
  overflow: auto;
  border: 1px solid var(--border);
  background: #0b1220;
  color: var(--text);
  border-radius: 6px;
  padding: 14px;
  font-size: 14px;
  line-height: 1.65;
}
.markdown-rendered h1,
.markdown-rendered h2,
.markdown-rendered h3,
.markdown-rendered h4 { color: #dbeafe; margin: 12px 0 8px; line-height: 1.35; }
.markdown-rendered h1 { font-size: 22px; }
.markdown-rendered h2 { font-size: 18px; }
.markdown-rendered h3 { font-size: 16px; }
.markdown-rendered p { margin: 8px 0; color: var(--text); }
.markdown-rendered ul,
.markdown-rendered ol { margin: 8px 0 8px 20px; }
.markdown-rendered li { margin: 4px 0; }
.markdown-rendered a { color: #7dd3fc; text-decoration: none; }
.markdown-rendered a:hover { text-decoration: underline; }
.markdown-rendered blockquote {
  margin: 10px 0;
  padding: 8px 12px;
  border-left: 3px solid #58a6ff;
  background: rgba(88,166,255,.08);
  color: #cbd5e1;
}
.markdown-rendered code {
  background: rgba(148,163,184,.14);
  border: 1px solid var(--border);
  padding: 1px 6px;
  border-radius: 4px;
  font-family: Consolas, 'SF Mono', monospace;
  font-size: 12px;
}
.markdown-rendered pre {
  background: #020617;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px;
  overflow: auto;
  margin: 10px 0;
}
.markdown-rendered pre code {
  border: 0;
  padding: 0;
  background: transparent;
}
.markdown-rendered table {
  width: 100%;
  border-collapse: collapse;
  margin: 10px 0;
  font-size: 13px;
}
.markdown-rendered th,
.markdown-rendered td {
  border: 1px solid var(--border);
  padding: 7px 8px;
  text-align: left;
}
.markdown-rendered th { background: rgba(148,163,184,.14); }
.markdown-rendered hr { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
.markdown-rendered strong { color: #e2e8f0; }
.markdown-rendered em { color: #94a3b8; font-style: italic; }
.url-preview-list {
  max-height: 240px;
  overflow: auto;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.url-preview-item {
  font-size: 13px;
  line-height: 1.45;
  color: var(--text2);
}
.url-preview-item.valid a { color: #7ee787; }
.url-preview-item a {
  color: var(--accent2);
  text-decoration: none;
  overflow-wrap: anywhere;
}
.url-preview-item a:hover { text-decoration: underline; }
@media (max-width: 980px) {
  .vendor-extra-panels { grid-template-columns: 1fr; }
  .vendor-extra-panels .markdown-preview-box { grid-column: auto; }
}

/* ── Analyze Form ───────────────────────────────────────────────────────── */
.analyze-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
@media (max-width: 700px) { .analyze-grid { grid-template-columns: 1fr; } }

.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
.form-group select, .form-group input { width: 100%; }

.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 9px 18px; border-radius: var(--radius); font-size: 13px; font-weight: 600;
  cursor: pointer; border: none; transition: opacity .15s, transform .1s;
}
.btn:hover { opacity: .88; }
.btn:active { transform: scale(.97); }
.btn-primary { background: var(--accent); color: #000; }
.btn-secondary { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
.btn-danger { background: rgba(248,81,73,.18); color: #fecaca; border: 1px solid rgba(248,81,73,.45); }
.btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

.manage-grid {
  display: grid;
  grid-template-columns: minmax(280px, 1fr) minmax(420px, 1.4fr);
  gap: 20px;
}
.manage-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.manage-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg);
}
.manage-item strong { font-size: 14px; }
.manage-item span { font-size: 12px; color: var(--text2); }
@media (max-width: 980px) {
  .manage-grid { grid-template-columns: 1fr; }
}

/* ── Progress Feed ──────────────────────────────────────────────────────── */
#progress-panel { display: none; }
#progress-panel.visible { display: block; }
.progress-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.spinner {
  width: 18px; height: 18px; border: 2px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin .7s linear infinite; flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }
.progress-vendor { font-weight: 700; }
.progress-status { color: var(--text2); font-size: 12px; }

.steps-feed {
  background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
  max-height: 380px; overflow-y: auto; padding: 12px;
  font-family: 'SF Mono', Consolas, 'Courier New', monospace; font-size: 12px;
}
.step-item { padding: 6px 8px; border-radius: 4px; margin-bottom: 4px; animation: fadeIn .3s; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
.step-thought     { color: #79c0ff; }
.step-action      { color: var(--accent); }
.step-observation { color: var(--text2); }
.step-reflection  { color: var(--visionary); }
.step-answer      { color: var(--success); }

.step-tag {
  display: inline-block; font-size: 10px; font-weight: 700; text-transform: uppercase;
  padding: 1px 5px; border-radius: 3px; margin-right: 6px; opacity: .7; background: var(--bg3);
}
.result-card {
  background: var(--bg3); border: 1px solid var(--success); border-radius: var(--radius);
  padding: 18px 22px; margin-top: 16px; display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
  animation: fadeIn .4s;
}
.result-card .score-big { font-size: 32px; font-weight: 800; color: var(--success); }
.result-card .result-meta { font-size: 14px; color: var(--text2); margin-top: 2px; }

/* ── Category Overview ──────────────────────────────────────────────────── */
.vendor-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px,1fr)); gap: 16px; }
.vendor-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 16px; cursor: pointer; transition: border-color .2s, transform .15s;
}
.vendor-card:hover { border-color: var(--accent); transform: translateY(-2px); }
.vendor-card .vc-name { font-weight: 700; font-size: 14px; margin-bottom: 6px; }
.vendor-card .vc-desc { font-size: 12px; color: var(--text2); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 12px; height: 34px; }
.vendor-card .vc-footer { display: flex; align-items: center; justify-content: space-between; }

/* ── Benchmark viewer ───────────────────────────────────────────────────── */
.benchmark-layout {
  display: grid;
  grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
  gap: 18px;
}
.benchmark-list-panel,
.benchmark-preview-panel {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.benchmark-list-head,
.benchmark-preview-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
}
.benchmark-list-head strong,
.benchmark-preview-head strong {
  font-size: 13px;
  letter-spacing: .2px;
}
.benchmark-search-wrap {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
}
.benchmark-search-wrap input {
  width: 100%;
}
.benchmark-list {
  max-height: 64vh;
  overflow-y: auto;
  padding: 8px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.benchmark-item {
  width: 100%;
  text-align: left;
  border: 1px solid transparent;
  background: var(--bg);
  color: var(--text);
  border-radius: 8px;
  padding: 10px 11px;
  cursor: pointer;
  transition: border-color .15s, background .15s, transform .1s;
}
.benchmark-item:hover {
  border-color: var(--accent2);
  background: rgba(88,166,255,.08);
}
.benchmark-item.active {
  border-color: var(--accent);
  background: rgba(0,212,170,.12);
}
.benchmark-item-title {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
}
.benchmark-item-file {
  display: block;
  margin-top: 4px;
  font-size: 11px;
  color: var(--text2);
}
.benchmark-preview-frame {
  width: 100%;
  height: calc(72vh - 48px);
  min-height: 520px;
  border: 0;
  background: #fff;
}

/* ── Chart Container ────────────────────────────────────────────────────── */
.chart-container { position: relative; height: 300px; }

/* ── Category pages ───────────────────────────────────────────────────── */
.category-page-grid {
  display: grid;
  grid-template-columns: minmax(0, 1.45fr) minmax(320px, 1fr);
  gap: 24px;
  margin-bottom: 24px;
  align-items: start;
}
.category-compare-wrap {
  height: 440px;
}

/* ── Skeleton ────────────────────────────────────────────────────────────── */
.skeleton { background: linear-gradient(90deg, var(--bg3) 25%, var(--border) 50%, var(--bg3) 75%); background-size: 400% 100%; animation: shimmer 1.4s infinite; border-radius: 4px; }
@keyframes shimmer { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }

/* ── Notification Toast ─────────────────────────────────────────────────── */
#toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 500;
  background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 12px 18px; font-size: 13px; max-width: 340px;
  box-shadow: var(--shadow); opacity: 0; transition: opacity .3s;
  pointer-events: none;
}
#toast.show { opacity: 1; }
#toast.toast-error { border-color: var(--danger); color: var(--danger); }
#toast.toast-success { border-color: var(--success); color: var(--success); }

/* ── Responsive Layout ─────────────────────────────────────────────────── */
@media (max-width: 1280px) {
  :root { --sidebar-w: 200px; }
  main { max-width: none; padding: 24px 26px; }
  .chart-container { height: 280px; }
}

@media (max-width: 1080px) {
  :root { --sidebar-w: 182px; }
  .page-header h1 { font-size: 22px; }
  .section-body { padding: 18px; }
  .stats-row { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
  .modal { max-width: 1040px; }
  .category-page-grid {
    grid-template-columns: 1fr;
    gap: 18px;
  }
  .category-compare-wrap { height: 360px; }
}

@media (max-width: 920px) {
  .layout { display: block; }
  aside {
    position: sticky;
    top: var(--header-h);
    left: 0;
    right: 0;
    bottom: auto;
    width: 100%;
    border-right: none;
    border-bottom: 1px solid var(--border);
    padding: 10px 8px;
    max-height: 46vh;
    overflow-x: auto;
    overflow-y: auto;
    display: flex;
    gap: 10px;
    z-index: 95;
  }
  .nav-section { min-width: 220px; padding: 0 6px; margin-bottom: 0; }
  .nav-label { font-size: 10px; }
  main {
    margin-left: 0;
    width: 100%;
    padding: 16px;
    max-width: none;
  }
  .responsive-cat-grid,
  .category-page-grid { grid-template-columns: 1fr !important; }
  .manage-grid { grid-template-columns: 1fr; }
  .benchmark-layout { grid-template-columns: 1fr; }
  .benchmark-list { max-height: 42vh; }
  .benchmark-preview-frame {
    min-height: 460px;
    height: 66vh;
  }
  .chart-container,
  .radar-wrap { height: 250px; }
  .category-compare-wrap { height: 320px; }
}

@media (max-width: 680px) {
  header { padding: 0 12px; gap: 8px; }
  .logo { font-size: 14px; gap: 8px; }
  .lm-badge { font-size: 11px; padding: 3px 8px; }
  main { padding: 12px; }
  .page-header h1 { font-size: 20px; }
  .page-header p { font-size: 14px; }
  .section-header { padding: 12px 14px; }
  .section-title { font-size: 15px; }
  .section-body { padding: 14px; }
  .filters { gap: 8px; }
  .filter-group {
    width: 100%;
    justify-content: space-between;
    gap: 8px;
  }

function t(key) {
  return (I18N[state.language] && I18N[state.language][key]) || I18N.es[key] || key;
}

function tr(key, params = {}) {
  return t(key).replace(/\{(\w+)\}/g, (_, name) => String(params[name] ?? `{${name}}`));
}

function setLanguage(lang) {
  state.language = lang === 'en' ? 'en' : 'es';
  localStorage.setItem('vendors_ai_language', state.language);
  applyStaticTranslations();
  render();
}

function applyStaticTranslations() {
  const set = (id, text) => {
    const el = document.getElementById(id);
    if (el) el.textContent = text;
  };

  set('lang-label', t('language'));
  set('nav-general', t('general'));
  set('nav-dashboard', t('dashboard'));
  set('nav-all-vendors', t('allVendors'));
  set('nav-benchmark', t('benchmark'));
  set('nav-categories', t('categories'));
  set('nav-tools', t('tools'));
  set('nav-analyze-vendor', t('analyzeVendor'));
  set('nav-mitre-chat', t('mitreChatNav'));
  set('nav-mitre-coverage-db', t('mitreCvgDbNav'));
  set('nav-paloalto-rag', t('paRagNav'));
  set('nav-manage-data', t('manageData'));

  const selector = document.getElementById('lang-select');
  if (selector) selector.value = state.language;
}

function getCriteriaForCategory(categoryName) {
  const normalized = String(categoryName || '').trim().toLowerCase();
  if (normalized === 'edr/xdr') return EDR_XDR_CRITERIA;
  if (normalized === 'soar') return SOAR_CRITERIA;
  if (normalized === 'iam/pam') return IAM_PAM_CRITERIA;
  if (normalized === 'zero trust') return ZERO_TRUST_CRITERIA;
  if (normalized === 'threat intelligence') return THREAT_INTELLIGENCE_CRITERIA;
  return SIEM_CRITERIA;
}

// ══════════════════════════════════════════════════════════════════════════
async function api(path, opts = {}) {
  const r = await fetch(path, opts);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

//  Toast
// ══════════════════════════════════════════════════════════════════════════
let toastTimer;
function toast(msg, type = 'info') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show toast-${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 3500);
}

async function checkLmStatus() {
  const dot = document.getElementById('lm-dot');
  const lbl = document.getElementById('lm-label');
  dot.className = 'lm-dot';
  lbl.textContent = t('lmChecking');
  try {
    const s = await api('/api/lm-status');
    state.lmOnline = s.alive;
    dot.className = 'lm-dot ' + (s.alive ? 'online' : 'offline');
    lbl.textContent = s.alive ? `${s.model}` : t('lmOffline');
    if (!s.alive) toast(tr('lmOfflineStart', { url: s.url }), 'error');
  } catch {
    dot.className = 'lm-dot offline';
    lbl.textContent = t('lmError');
  }
}

function navigate(view, catName) {
  state.view = view;
  state.activeCategory = catName || null;

  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active',
      el.dataset.view === view && (!catName || el.dataset.cat === catName)
    );
  });

  render();
}

function buildSidebar(dbCats, defs) {
  const nav = document.getElementById('cat-nav');
  nav.innerHTML = '';

  // Merge: show static defs, mark count from DB
  const countMap = {};
  dbCats.forEach(c => countMap[c.name] = c);

  defs.forEach(def => {
    const dbCat = countMap[def.name];
    const div = document.createElement('div');
    div.className = 'nav-item';
    div.dataset.view = 'category';
    div.dataset.cat = def.name;
    div.onclick = () => navigate('category', def.name);
    div.innerHTML = `
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${def.name}</span>
      <span class="badge" id="badge-cat-${def.name}">0</span>`;
    nav.appendChild(div);
  });
}

async function render() {
  const main = document.getElementById('main-content');
  if (state.view === 'dashboard')  await renderDashboard(main);
  else if (state.view === 'vendors') await renderVendors(main);
  else if (state.view === 'benchmark') await renderBenchmark(main);
  else if (state.view === 'category') await renderCategory(main);
  else if (state.view === 'analyze') renderAnalyze(main);
  else if (state.view === 'mitre-chat') renderMitreChat(main);
  else if (state.view === 'mitre-coverage-db') await renderMitreCoverageDb(main);
  else if (state.view === 'paloalto-rag') await renderPaloAltoRag(main);
  else if (state.view === 'manage') await renderManage(main);
}

function statCard(label, value, sub) {
  return `<div class="stat-card">
    <div class="label">${label}</div>
    <div class="value">${value}</div>
    <div class="sub">${sub}</div>
  </div>`;
}

async function buildCategoryBarChart(dbCats, defs) {
  const canvas = document.getElementById('cat-bar-chart');
  if (!canvas) return;

  // Count per category in DB
  const counts = {};
  await Promise.all(defs.map(async d => {
    try {
      const vendors = await api(`/api/categories/${encodeURIComponent(d.name)}/vendors`);
      counts[d.name] = vendors.length;
      const badge = document.getElementById(`badge-cat-${d.name}`);
      if (badge) badge.textContent = vendors.length;
    } catch { counts[d.name] = 0; }
  }));

  if (state.barChart) state.barChart.destroy();
  state.barChart = new Chart(canvas, {
    type: 'bar',
    data: {
      labels: defs.map(d => d.name),
      datasets: [{
        label: 'Vendors analyzed',
        label: t('vendorsAnalyzedChartLabel'),
        data: defs.map(d => counts[d.name] || 0),
        backgroundColor: 'rgba(0,212,170,.6)',
        borderColor: '#00d4aa',
        borderWidth: 1,
        borderRadius: 4,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: '#30363d' }, ticks: { color: '#8b949e' } },
        y: { grid: { color: '#30363d' }, ticks: { color: '#8b949e', stepSize: 1 }, beginAtZero: true },
      }
    }
  });
}

async function loadVendors() {
  const cat = document.getElementById('f-cat')?.value || '';
  const min = document.getElementById('f-min')?.value || '';
  const region = document.getElementById('f-region')?.value || '';
  const pos = document.getElementById('f-pos')?.value || '';
  const sort = document.getElementById('f-sort')?.value || 'score';

  const params = new URLSearchParams();
  if (cat)    params.set('category', cat);
  if (min)    params.set('minScore', min);
  if (region) params.set('region', region);
  if (pos)    params.set('marketPosition', pos);
  params.set('sortBy', sort);

  try {
    const vendors = await api('/api/vendors?' + params);
    const wrap = document.getElementById('vendors-table-wrap');
    if (!wrap) return;
    if (!vendors.length) {
      wrap.innerHTML = emptyState(t('noVendorsFound'), t('adjustFilters'), 'analyze');
    } else {
      wrap.innerHTML = `<div class="table-wrap">${vendorTable(vendors)}</div>`;
    }
  } catch (e) { toast(tr('failedLoadVendors', { message: e.message }), 'error'); }
}

  if (state.benchmarkFiles.length) return;
  const files = await api('/api/benchmark/files');
  state.benchmarkFiles = Array.isArray(files) ? files : [];

  if (!state.benchmarkSelected && state.benchmarkFiles.length) {
    state.benchmarkSelected = state.benchmarkFiles[0].name;
  }
}

function onBenchmarkSearch(value) {
  state.benchmarkSearch = String(value || '').trim().toLowerCase();
  renderBenchmarkList();
}

function selectBenchmarkFile(name) {
  state.benchmarkSelected = name;
  renderBenchmarkList();
}

function renderBenchmarkList() {
  const listEl = document.getElementById('benchmark-list');
  const frame = document.getElementById('benchmark-frame');
  const openLink = document.getElementById('benchmark-open-link');
  const countEl = document.getElementById('benchmark-count');
  if (!listEl || !frame || !openLink || !countEl) return;

  if (!state.benchmarkFiles.length) {
    listEl.innerHTML = `<div class="empty-state" style="padding:24px 12px"><h3>${t('benchmarkNoFiles')}</h3></div>`;
    frame.removeAttribute('src');
    openLink.href = '#';
    openLink.style.pointerEvents = 'none';
    openLink.style.opacity = '.55';
    countEl.textContent = '0';
    return;
  }

  const filtered = state.benchmarkFiles.filter(file => {
    if (!state.benchmarkSearch) return true;
    const haystack = `${file.name} ${file.title || ''}`.toLowerCase();
    return haystack.includes(state.benchmarkSearch);
  });

  if (!filtered.some(f => f.name === state.benchmarkSelected) && filtered.length) {
    state.benchmarkSelected = filtered[0].name;
  }

  if (!filtered.length) {
    listEl.innerHTML = `<div class="empty-state" style="padding:24px 12px"><h3>${t('benchmarkNoResults')}</h3></div>`;
    frame.removeAttribute('src');
    openLink.href = '#';
    openLink.style.pointerEvents = 'none';
    openLink.style.opacity = '.55';
    countEl.textContent = '0';
    return;
  }

  countEl.textContent = String(filtered.length);
  listEl.innerHTML = filtered.map(file => `
    <button
      class="benchmark-item ${file.name === state.benchmarkSelected ? 'active' : ''}"
      onclick="selectBenchmarkFile('${esc(file.name)}')"
    >
      <span class="benchmark-item-title">${escHtml(file.title || file.name)}</span>
      <span class="benchmark-item-file">${escHtml(file.name)}</span>
    </button>`).join('');

  const current = filtered.find(f => f.name === state.benchmarkSelected) || filtered[0];
  frame.src = current.url;
  openLink.href = current.url;
  openLink.style.pointerEvents = 'auto';
  openLink.style.opacity = '1';
}

async function cvgDbLoadVendors() {

  if (!list) return;
  try {
    cvgDb.vendors = await api('/api/mitre/vendor-stats');

      list.innerHTML = `<div class="cvgdb-empty">${t('mitreCvgDbEmpty')}</div>`;
      return;
    }
    list.innerHTML = `<table class="cvgdb-table">

function cvgDbRenderRows() {
  const tbody = document.getElementById('cvgdb-tbody');
  if (!tbody) return;
  tbody.innerHTML = cvgDb.vendors.map((v, idx) => {
    const isActive = cvgDb.selectedVendor === v.vendor;
    const score = (v.latestScore || 0).toFixed(1);
    const scoreColor = score >= 7 ? 'var(--success)' : score >= 4 ? 'var(--warn)' : 'var(--danger)';
    const sparkHtml = cvgDbSparkline(v.scoreHistory || []);
    // Use numeric index in onclick — vendor names may contain quotes/apostrophes
    // which break HTML attribute parsing when passed through JSON.stringify.
    return `<tr class="${isActive ? 'active' : ''}" onclick="cvgDbSelectVendorByIdx(${idx})">
      <td>
        <div style="font-weight:500;font-size:13px">${esc(v.vendor)}</div>
        <div style="font-size:10px;color:var(--text2)">${new Date(v.lastAnalyzed).toLocaleDateString()}</div>
      </td>
      <td style="text-align:center">
        <span class="cvgdb-score" style="color:${scoreColor}">${score}</span>
      </td>
      <td style="text-align:center;font-size:12px;color:var(--text2)">${v.latestTtpCount}</td>
      <td style="text-align:center">
        <div style="display:flex;align-items:center;justify-content:center;gap:5px">
          ${sparkHtml}
          <span style="font-size:10px;color:var(--text2)">${v.analysisCount}</span>
        </div>
      </td>
      <td style="text-align:right">
        <button onclick="event.stopPropagation();cvgDbDeleteVendorByIdx(${idx})"
          style="background:none;border:none;color:var(--text2);cursor:pointer;font-size:12px;padding:3px 6px;border-radius:3px"
          title="${t('mitreCvgDbDeleteVendor')}">✕</button>
      </td>
    </tr>`;
  }).join('');
}

function cvgDbSelectVendorByIdx(idx) {
  const v = cvgDb.vendors[idx];
  if (v) cvgDbSelectVendor(v.vendor);
}

async function cvgDbDeleteVendorByIdx(idx) {
  const v = cvgDb.vendors[idx];
  if (v) cvgDbDeleteVendor(v.vendor);
}

function cvgDbSparkline(history) {
  if (!history.length) return '';
  const max = Math.max(...history, 0.1);
  return `<div class="cvgdb-sparkline">${history.map(s => {
    const h = Math.max(2, Math.round((s / max) * 18));
    return `<div class="cvgdb-spark-bar" style="height:${h}px"></div>`;
  }).join('')}</div>`;
}

async function cvgDbSelectVendor(vendor) {
  cvgDb.selectedVendor = vendor;
  cvgDb.selectedRunId = null;
  cvgDbRenderRows();
  const titleEl = document.getElementById('cvgdb-detail-title');
  const bodyEl  = document.getElementById('cvgdb-detail-body');
  if (!bodyEl) return;
  if (titleEl) titleEl.textContent = vendor;
  bodyEl.innerHTML = `<div style="color:var(--text2);font-size:13px;padding:8px">Cargando…</div>`;

  try {
    const [reports, merged] = await Promise.all([
      api(`/api/mitre/vendor-stats/${encodeURIComponent(vendor)}/reports`),
      api(`/api/mitre/vendor-stats/${encodeURIComponent(vendor)}/merged`).catch(() => null),
    ]);
    cvgDb.currentReports = reports;
    cvgDb.currentMerged  = merged;
    cvgDb.tab = reports.length >= 2 && merged ? 'merged' : 'history';
    cvgDbRenderDetail(vendor);
  } catch (e) {
    bodyEl.innerHTML = `<div style="color:var(--danger)">${esc(e.message)}</div>`;
  }
}

function cvgDbRenderDetail(vendor) {
  const bodyEl  = document.getElementById('cvgdb-detail-body');
  if (!bodyEl) return;
  const reports = cvgDb.currentReports;
  const merged  = cvgDb.currentMerged;

  const hasMerged = merged && !merged.insufficientInfo && reports.length >= 2;
  const tabs = `
    <div class="cvgdb-tab-bar">
      ${hasMerged ? `<button class="cvgdb-tab${cvgDb.tab==='merged'?' active':''}" onclick="cvgDbSetTab('merged')">${t('mitreCvgDbMerged')}</button>` : ''}
      <button class="cvgdb-tab${cvgDb.tab==='history'?' active':''}" onclick="cvgDbSetTab('history')">${t('mitreCvgDbRunHistory')}</button>
      <div style="flex:1"></div>
      <button class="btn btn-sm" onclick="cvgDbReanalyze()" style="font-size:11px;padding:3px 10px">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="vertical-align:middle;margin-right:3px"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        ${t('mitreCvgDbReanalyze')}
      </button>
    </div>`;

  let content = '';
  if (cvgDb.tab === 'merged' && hasMerged) {
    content = cvgDbRenderReport(merged, reports.length);
  } else {
    content = cvgDbRenderHistory();
  }

  bodyEl.innerHTML = tabs + content;
}

function cvgDbSetTab(tab) {
  cvgDb.tab = tab;
  cvgDbRenderDetail(cvgDb.selectedVendor);
}

function cvgDbRenderReport(report, runCount) {
  if (!report || report.insufficientInfo) {
    return `<div style="color:var(--danger);font-size:13px">${t('mitreCvgDbNoMerge')}</div>`;
  }
  const score = (report.overallCoverageScore || 0).toFixed(1);
  const scoreColor = score >= 7 ? 'var(--success)' : score >= 4 ? 'var(--warn)' : 'var(--danger)';

  let html = `<div class="coverage-report">
    <div class="cvgdb-detail-header">
      <div class="coverage-score" style="color:${scoreColor}">${score}<span>/10 ${t('mitreChatScore')}</span></div>
      <div style="font-size:12px;color:var(--text2)">
        ${(report.ttpsAddressed||[]).length} ${t('mitreChatTechniques')} &nbsp;·&nbsp;
        ${(report.coverageGaps||[]).length} gaps &nbsp;·&nbsp;
        ${runCount ? `${runCount} ${t('mitreCvgDbRuns')}` : ''}
      </div>
    </div>`;

  if (report.summary) html += `<div class="coverage-summary">${esc(report.summary)}</div>`;

  if (report.ttpsAddressed?.length) {
    html += `<table class="ttp-table">
      <thead><tr>
        <th style="width:100px">ID</th><th>Técnica</th>
        <th style="width:110px">Cobertura</th><th>${t('mitreChatProducts')}</th>
      </tr></thead><tbody>`;
    report.ttpsAddressed.forEach(t2 => {
      html += `<tr>
        <td><code style="font-size:11px;color:var(--accent2)">${esc(t2.techniqueId)}</code></td>
        <td>
          <div style="font-weight:500">${esc(t2.techniqueName)}</div>
          ${t2.tactics?.length ? `<div style="font-size:11px;color:var(--text2)">${esc(t2.tactics.join(', '))}</div>` : ''}
          ${t2.description ? `<div style="font-size:11px;color:var(--text2);margin-top:2px">${esc(t2.description.slice(0,120))}…</div>` : ''}
        </td>
        <td>${mitreCvgBadge(t2.coverageLevel)}</td>

  if (report.coverageGaps?.length) {

function cvgDbRenderHistory() {
  const reports = cvgDb.currentReports;
  if (!reports.length) return `<div class="cvgdb-empty">${t('mitreCvgDbEmpty')}</div>`;

  const selectedId = cvgDb.selectedRunId ?? reports[0].id;
  const selected   = reports.find(r => r.id === selectedId) || reports[0];

  const runList = reports.map((r, i) => {
    const score = r.overallScore.toFixed(1);
    const scoreColor = score >= 7 ? 'var(--success)' : score >= 4 ? 'var(--warn)' : 'var(--danger)';
    const isActive = r.id === selected.id;
    return `<div class="cvgdb-run-row${isActive?' active':''}" onclick="cvgDbSelectRun(${r.id})">
      <span class="cvgdb-run-num">#${reports.length - i}</span>
      <span class="cvgdb-run-date">${new Date(r.createdAt).toLocaleString()}</span>
      ${r.insufficient
        ? `<span style="font-size:11px;color:var(--danger)">Insuficiente</span>`
        : `<span style="font-size:12px;font-weight:700;color:${scoreColor}">${score}</span>
           <span style="font-size:11px;color:var(--text2)">${r.ttpCount} TTPs</span>`}
    </div>`;
  }).join('');

  return `<div style="display:grid;grid-template-columns:200px 1fr;gap:12px;align-items:start">
    <div>
      <div style="font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">${t('mitreCvgDbRunHistory')}</div>
      <div class="cvgdb-history">${runList}</div>
    </div>
    <div id="cvgdb-run-detail">${cvgDbRenderReport(selected.report, null)}</div>
  </div>`;
}

function cvgDbSelectRun(runId) {
  cvgDb.selectedRunId = runId;

  const vendor = cvgDb.selectedVendor;

async function cvgDbDeleteVendor(vendor) {
  if (!confirm(`${t('mitreCvgDbDeleteVendor')}\n\n"${vendor}"`)) return;
  try {
    await api(`/api/mitre/vendor-stats/${encodeURIComponent(vendor)}`, { method: 'DELETE' });

function pragAddUrl() {
  const input = document.getElementById('prag-url-input');
  const url = (input?.value ?? '').trim();
  if (!url || !url.startsWith('http')) return;
  if (!paRag.extraUrls.includes(url)) paRag.extraUrls.push(url);

async function pragIngest() {
  const btn    = document.getElementById('prag-ingest-btn');
  const result = document.getElementById('prag-ingest-result');
  const useDefaults = document.getElementById('prag-use-defaults')?.checked ?? true;

  if (btn) { btn.disabled = true; btn.textContent = t('paRagIngestRunning'); }
  if (result) result.textContent = '';
  try {
    const data = await api('/api/paloalto-rag/ingest', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        urls:         paRag.extraUrls.length ? [...paRag.extraUrls] : undefined,
        use_defaults: useDefaults,
      }),
    });
    const msg = `✓ ${data.ingested} fragmentos añadidos, ${data.skipped} omitidos.`;
    if (result) result.textContent = msg + (data.errors?.length ? `  ${data.errors.length} errores.` : '');
    toast(msg, 'success');
    await pragRefresh();
  } catch (e) {
    if (result) result.textContent = 'Error: ' + e.message;
    toast('Error: ' + e.message, 'error');
    if (btn) { btn.disabled = false; btn.textContent = t('paRagIngestBtn'); }

async function pragQuery() {
  const input   = document.getElementById('prag-query-input');
  const btn     = document.getElementById('prag-query-btn');
  const resEl   = document.getElementById('prag-query-result');
  const product = document.getElementById('prag-filter-product')?.value || undefined;
  const action  = document.getElementById('prag-filter-action')?.value  || undefined;
  const query   = (input?.value ?? '').trim();
  if (!query) return;

  if (btn) { btn.disabled = true; btn.textContent = '…'; }
  if (resEl) resEl.innerHTML = '<div style="color:var(--text2);font-size:13px">Consultando…</div>';

  try {
    const filters = {};
    if (product) filters.product_line = product;
    if (action)  filters.action_type  = action;

    const data = await api('/api/paloalto-rag/query', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        query,
        top_k:          5,
        filters:        Object.keys(filters).length ? filters : undefined,
        use_self_query: true,
      }),
    });

    const pct  = ((data.confidence_score ?? 0) * 100).toFixed(1);
    const tier = pct >= 60 ? 'high' : pct >= 35 ? 'mid' : 'low';
    const filterBadge = data.applied_filter
      ? Object.entries(data.applied_filter).map(([k,v])=>`<span class="prag-source-badge">${esc(k)}=${esc(v)}</span>`).join('')
      : '';

    const sources = (data.sources ?? []).map(s =>
      `<span class="prag-source-badge" title="${esc(s.url)}">${esc(s.title || s.url)}</span>`
    ).join('');

    resEl.innerHTML = `
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap">
        <span class="prag-confidence ${tier}">Confianza: ${pct}%</span>
        ${filterBadge}
      </div>
      <div class="prag-result markdown-rendered">${renderMarkdownToHtml(data.answer || '—')}</div>
      ${sources ? `<div style="margin-top:8px">${sources}</div>` : ''}`;
  } catch (e) {
    if (resEl) resEl.innerHTML = `<div style="color:var(--danger);font-size:13px">Error: ${esc(e.message)}</div>`;
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = t('paRagQueryBtn'); }
  }
}

function pragStatsHtml(stats) {
  if (!stats || stats.total_chunks === 0) {
    return `<div class="prag-kv"><span>Total</span><strong>0 fragmentos</strong></div>

  }

  const maxCount = (obj) => Math.max(1, ...Object.values(obj));

  const barSection = (title, obj) => {
    const max = maxCount(obj);
    return `<div style="margin-bottom:14px">
      <div style="font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">${title}</div>

        </div>`).join('')}

  return `
    <div class="prag-kv" style="margin-bottom:12px">
      <span>Total fragmentos</span><strong>${stats.total_chunks}</strong>
    </div>
    <div class="prag-kv" style="margin-bottom:16px">
      <span>Fuentes únicas</span><strong>${stats.unique_sources}</strong>
    </div>
    ${barSection(t('paRagByProduct'), stats.by_product || {})}

    ${barSection(t('paRagBySource'),  stats.by_source  || {})}`;
}

// Known vendors for NLU extraction (longest-first for greedy matching)
const KNOWN_VENDORS = [
  'Palo Alto Networks','Check Point','Trend Micro','SentinelOne','CrowdStrike',
  'Microsoft','Fortinet','Broadcom','Symantec','Trellix','Darktrace','Vectra',
  'Tenable','Qualys','Rapid7','Elastic','Splunk','Cisco','McAfee','IBM',
  'Google','Azure','AWS',
].sort((a,b) => b.length - a.length);

function extractVendorFromQuery(input) {
  const lower = input.toLowerCase();
  for (const v of KNOWN_VENDORS) {
    if (lower.includes(v.toLowerCase())) return v;
  }
  // Fallback: first capitalised word sequence not in common query words
  const stopWords = new Set(['How','Does','What','Show','Tell','About','The','ATT&CK',
    'MITRE','Coverage','Techniques','Tactics','Security','Cyber','Threat','Vendor']);
  const caps = input.match(/\b[A-Z][a-zA-Z0-9&]*(?:\s+[A-Z][a-zA-Z0-9&]*)*\b/g) || [];
  for (const c of caps) { if (!stopWords.has(c)) return c; }
  return null;
}

  return `<span class="cvg-badge ${map[level]||'cvg-unknown'}">${label[level]||level}</span>`;
}

async function checkMitreRagStatus() {
  const el = document.getElementById('mitre-rag-status');
  if (!el) return;
  try {
    const s = await api('/api/mitre/status');
    if (s.ready) { el.style.display = 'none'; return; }
    const isModelMismatch = s.modelMismatch;
    const isNotIngested   = s.embeddings === 0;
    const icon = isModelMismatch ? '⚠️' : 'ℹ️';
    let msg = '';
    if (isModelMismatch) {
      msg = `<strong>RAG model mismatch</strong> — stored embeddings use <code>${s.storedModel}</code> ` +
            `but EMBEDDING_MODEL is <code>${s.configuredModel}</code>. ` +
            `Run <code>npm run mitre:reset && npm run mitre:ingest</code> then restart the server.`;
    } else if (isNotIngested) {
      msg = `<strong>MITRE knowledge base empty</strong> — ${s.entries} entries found but no embeddings. ` +
            `Run <code>npm run mitre:ingest</code> with an embedding model loaded in LM Studio.`;
    } else {
      msg = s.hint || 'RAG not ready.';
    }
    el.style.display = 'block';
    el.style.cssText = 'display:block;padding:10px 14px;background:rgba(227,179,65,.08);border:1px solid var(--warn);border-radius:var(--radius);color:var(--warn);font-size:12px;line-height:1.6;margin-bottom:4px';
    el.innerHTML = `${icon} ${msg}`;
  } catch {
    el.style.display = 'none';
  }
}

async function submitMitreQuery() {
  const input = document.getElementById('mitre-query-input');
  const query = input.value.trim();
  if (!query) { showMitreClarify(t('mitreChatEnterVendor')); return; }

  const vendor = extractVendorFromQuery(query);
  if (!vendor) { showMitreClarify(t('mitreChatClarify')); return; }

  hideMitreClarify();
  input.value = '';
  document.getElementById('btn-mitre-ask').disabled = true;

  // Append user bubble
  appendChatBubble('user', `<strong>${esc(vendor)}</strong> — ${esc(query)}`);

  // Thinking bubble (will be replaced)
  const thinkId = 'mitre-think-' + Date.now();
  appendChatBubble('agent thinking', `<span id="${thinkId}">${t('mitreChatThinking')}</span>`);

  try {
    const body = { vendor, query };
    if (state.mitreConversationId) body.conversationId = state.mitreConversationId;
    const { jobId } = await api('/api/mitre/coverage', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    await streamMitreCoverageSSE(jobId, thinkId);
  } catch (e) {
    replaceThinkBubble(thinkId, 'insufficient', tr('mitreChatError', { message: e.message }));
  }

  document.getElementById('btn-mitre-ask').disabled = false;
}

function appendChatBubble(classes, html) {
  const log = document.getElementById('mitre-chat-log');
  if (!log) return;
  const div = document.createElement('div');
  div.className = 'chat-bubble ' + classes;
  div.innerHTML = html;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
  return div;
}

function replaceThinkBubble(thinkId, classes, html) {
  const span = document.getElementById(thinkId);
  if (!span) return;
  const bubble = span.closest('.chat-bubble');
  if (!bubble) return;
  bubble.className = 'chat-bubble ' + classes;
  bubble.innerHTML = html;
}

function streamMitreCoverageSSE(jobId, thinkId) {
  return new Promise((resolve) => {
    const steps = [];
    const es = new EventSource(`/api/mitre/coverage/${jobId}/progress`);

    es.addEventListener('conversation', e => {
      try {
        const { conversationId } = JSON.parse(e.data);
        if (conversationId) {
          state.mitreConversationId = conversationId;
        }
      } catch { /* ignore */ }
    });

    es.addEventListener('step', e => {
      const step = JSON.parse(e.data);
      steps.push(step);
      const span = document.getElementById(thinkId);
      if (span) {
        const icons = { action:'⚡', observation:'👁', thought:'💭', answer:'✅' };
        span.innerHTML = `<div class="step-feed-mitre">${
          steps.slice(-3).map(s =>
            `<div class="step-item-mitre">
              <span class="step-type-mitre">${(icons[s.type]||'•')} ${s.type.toUpperCase()}</span>
              <span>${esc(s.content.slice(0, 100))}</span>
            </div>`
          ).join('')
        }</div>`;
      }
    });

    es.addEventListener('done', e => {
      es.close();
      const data = JSON.parse(e.data);
      if (data.conversationId) {
        state.mitreConversationId = data.conversationId;
        const tag = document.getElementById('mitre-saved-tag');
        if (tag) { tag.style.display = 'inline-flex'; setTimeout(() => { tag.style.display = 'none'; }, 3000); }
        loadMitreConversations();
      }
      replaceThinkBubble(thinkId, 'agent', renderCoverageReport(data));
      resolve();
    });

    es.addEventListener('error', e => {
      es.close();
      let msg = 'Unknown error';
      try { msg = JSON.parse(e.data).error || msg; } catch {}
      replaceThinkBubble(thinkId, 'insufficient', tr('mitreChatError', { message: msg }));
      resolve();
    });

    es.onerror = () => { es.close(); resolve(); };
  });
}

function renderCoverageReport(report) {
  if (report.insufficientInfo) {
    return `<div style="color:var(--danger)">${t('mitreChatInsufficient')}</div>
      ${report.summary ? `<div style="color:var(--text2);font-size:12px;margin-top:6px">${esc(report.summary)}</div>` : ''}`;
  }

  const score = (report.overallCoverageScore || 0).toFixed(1);
  const scoreColor = score >= 7 ? 'var(--success)' : score >= 4 ? 'var(--warn)' : 'var(--danger)';

  let html = `<div class="coverage-report">
    <div class="coverage-header">
      <div class="coverage-score" style="color:${scoreColor}">${score}<span>/10 ${t('mitreChatScore')}</span></div>
      <div style="font-size:12px;color:var(--text2)">${report.ttpsAddressed.length} ${t('mitreChatTechniques')} &nbsp;·&nbsp; ${(report.sourcesConsulted||[]).length} ${t('mitreChatSources')}</div>
    </div>`;

  if (report.summary) {
    html += `<div class="coverage-summary">${esc(report.summary)}</div>`;
  }

  if (report.ttpsAddressed && report.ttpsAddressed.length > 0) {
    html += `<table class="ttp-table">
      <thead><tr>
        <th style="width:100px">ID</th>
        <th>Técnica</th>
        <th style="width:110px">Cobertura</th>
        <th>${t('mitreChatProducts')}</th>
      </tr></thead><tbody>`;
    report.ttpsAddressed.forEach(t2 => {
      html += `<tr>
        <td><code style="font-size:11px;color:var(--accent2)">${esc(t2.techniqueId)}</code></td>
        <td>
          <div style="font-weight:500">${esc(t2.techniqueName)}</div>
          ${t2.tactics.length ? `<div style="font-size:11px;color:var(--text2)">${esc(t2.tactics.join(', '))}</div>` : ''}
          ${t2.description ? `<div style="font-size:11px;color:var(--text2);margin-top:2px">${esc(t2.description.slice(0,120))}…</div>` : ''}
        </td>
        <td>${mitreCvgBadge(t2.coverageLevel)}</td>
        <td style="font-size:11px;color:var(--text2)">${(t2.products||[]).slice(0,2).map(p=>esc(p)).join('<br>')}</td>
      </tr>`;
    });
    html += `</tbody></table>`;
  }

  if (report.coverageGaps && report.coverageGaps.length > 0) {
    html += `<div>
      <div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">${t('mitreChatGaps')}</div>
      <div class="gap-list">${report.coverageGaps.slice(0,6).map(g=>`<div class="gap-item">✗ ${esc(g)}</div>`).join('')}</div>
    </div>`;
  }

  html += `</div>`;
  return html;
}

function showMitreClarify(msg) {

async function loadMitreConversations() {
  const list = document.getElementById('mitre-conv-list');
  if (!list) return;
  try {
    const convs = await api('/api/mitre/conversations');
    if (!convs.length) {
      list.innerHTML = `<div style="color:var(--text2);font-size:12px;padding:8px 0">${t('mitreChatNoHistory')}</div>`;
      return;
    }
    list.innerHTML = convs.map(c => {
      const isActive = c.id === state.mitreConversationId;
      const date = new Date(c.updatedAt || c.createdAt).toLocaleDateString();
      return `<div class="conv-item${isActive ? ' active' : ''}" onclick="loadMitreConversation(${c.id})" title="${t('mitreChatLoadConv')}">
        <div style="flex:1;min-width:0">
          <div class="conv-item-title">${esc(c.title)}</div>
          <div class="conv-item-date">${date}${c.messageCount ? ` · ${c.messageCount} msgs` : ''}</div>
        </div>
        <button class="conv-item-del" onclick="event.stopPropagation();deleteMitreConversation(${c.id})" title="${t('mitreChatDeleteConv')}">✕</button>
      </div>`;
    }).join('');
  } catch { /* non-fatal */ }
}

async function loadMitreConversation(id) {
  try {
    const conv = await api(`/api/mitre/conversations/${id}`);
    state.mitreConversationId = id;

    const log = document.getElementById('mitre-chat-log');
    if (!log) return;
    log.innerHTML = '';

    (conv.messages || []).forEach(msg => {
      if (msg.role === 'user') {
        appendChatBubble('user', esc(msg.content));
      } else {
        if (msg.report) {
          appendChatBubble('agent', renderCoverageReport(msg.report.report));
        } else {
          appendChatBubble('agent', esc(msg.content));
        }
      }
    });

    // Refresh list to highlight active
    loadMitreConversations();
  } catch (e) {
    toast('Error loading conversation: ' + e.message, 'error');
  }
}

async function deleteMitreConversation(id) {
  try {
    await api(`/api/mitre/conversations/${id}`, { method: 'DELETE' });
    if (state.mitreConversationId === id) {
      state.mitreConversationId = null;
      const log = document.getElementById('mitre-chat-log');
      if (log) log.innerHTML = '';
    }
    loadMitreConversations();
  } catch (e) {
    toast('Error deleting conversation: ' + e.message, 'error');
  }
}

function mitreNewChat() {
  state.mitreConversationId = null;
  const log = document.getElementById('mitre-chat-log');
  if (log) log.innerHTML = '';
  const input = document.getElementById('mitre-query-input');
  if (input) input.focus();
  hideMitreClarify();
  loadMitreConversations();
}

async function startAnalysis() {
  const category = document.getElementById('a-category').value.trim();
  const vendor   = document.getElementById('a-vendor').value.trim();

  if (!category) { toast(t('pleaseSelectCategory'), 'error'); return; }
  if (!vendor)   { toast(t('pleaseEnterVendorName'), 'error'); return; }

  document.getElementById('btn-analyze').disabled = true;
  document.getElementById('progress-panel').classList.add('visible');
  document.getElementById('progress-vendor-name').textContent = vendor;
  document.getElementById('progress-status-text').textContent = t('startingAgent');
  document.getElementById('steps-feed').innerHTML = '';
  document.getElementById('analysis-result').innerHTML = '';
  document.getElementById('progress-spinner').style.display = 'block';

  try {
    const { jobId } = await api('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ vendor, category }),
    });
    state.currentJob = jobId;
    subscribeSSE(jobId, vendor);
  } catch (e) {
    toast(tr('failedToStartAnalysis', { message: e.message }), 'error');
    document.getElementById('btn-analyze').disabled = false;
  }
