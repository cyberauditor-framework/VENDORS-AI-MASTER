* { box-sizing: border-box; margin: 0; padding: 0; }

.search-wrap input:focus { outline: none; border-color: #534AB7; }
.stats { display: flex; gap: 16px; margin-bottom: 1.5rem; flex-wrap: wrap; }
.stat { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 10px 16px; flex: 1; min-width: 100px; }
.stat-n { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
.stat-l { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }

/* Benchmark dark-mode normalization */

  color-scheme: dark;
  --font-sans: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

const colorMap = {
  purple:["#EEEDFE","#534AB7"],
  blue:["#E6F1FB","#185FA5"],
  amber:["#FAEEDA","#BA7517"],
  teal:["#E1F5EE","#0F6E56"],
  coral:["#FAECE7","#993C1D"],
  green:["#EAF3DE","#3B6D11"],
  red:["#FCEBEB","#A32D2D"]
};

let activeFilter = "all";
let searchTerm = "";

function filterAll() {
  searchTerm = document.getElementById("search").value.toLowerCase();
  render();
}

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll(".pill").forEach(p => p.classList.toggle("active", p.dataset.f === f));
  render();
}

function render() {
  const grid = document.getElementById("grid");
  let cats = data;
  if (activeFilter !== "all") cats = cats.filter(c => c.id === activeFilter);
  if (searchTerm) {
    cats = cats.map(c => {
      const matchCat = c.cat.toLowerCase().includes(searchTerm);
      const vendors = matchCat ? c.vendors : c.vendors.filter(v => v.n.toLowerCase().includes(searchTerm));
      return {...c, vendors};
    }).filter(c => c.vendors.length > 0);
  }
  if (!cats.length) { grid.innerHTML = '<div class="no-res">Sin resultados</div>'; return; }
  grid.innerHTML = cats.map(c => {
    const [bg, fg] = colorMap[c.color] || colorMap.purple;
    return `<div class="cat-card">
      <div class="cat-header" style="background:${bg}20; border-bottom:0.5px solid var(--color-border-tertiary);">
        <div class="cat-icon" style="background:${bg}; color:${fg};">${c.icon}</div>
        <div><div class="cat-title">${c.cat}</div><div class="cat-sub">${c.sub}</div></div>
      </div>
      <div class="vendor-list">
        ${c.vendors.map((v,i) => {
          const rankClass = i===0?'r1':i===1?'r2':i===2?'r3':'rn';
          const rankStr = i===0?'①':i===1?'②':i===2?'③':`${i+1}`;
          const badgeLabel = v.b==='leader'?'Líder':v.b==='rising'?'Rising':'Native AI';
          const badgeClass = v.b==='leader'?'b-leader':v.b==='rising'?'b-rising':'b-native';
          return `<div class="vendor">
            <span class="rank ${rankClass}">${rankStr}</span>
            <span class="vendor-name">${v.n}</span>
            <span class="badge ${badgeClass}">${badgeLabel}</span>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

function buildFilters() {
  const wrap = document.getElementById("filters");
  const items = [{id:"all",label:"Todas las categorías"},...data.map(d=>({id:d.id,label:d.cat}))];
  wrap.innerHTML = items.map(i=>`<button class="pill${i.id==='all'?' active':''}" data-f="${i.id}" onclick="setFilter('${i.id}')">${i.label}</button>`).join('');
}

buildFilters();
render();
